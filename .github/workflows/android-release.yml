name: Android Release

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-release:
    if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[release]')
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        shell: pwsh
        run: |
          flutter test 2>&1 | Tee-Object -FilePath flutter-test.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Prepare Android release keystore
        if: success()
        shell: pwsh
        run: |
          if (-not "${{ secrets.ANDROID_KEYSTORE_BASE64 }}") {
            Write-Error "ANDROID_KEYSTORE_BASE64 is required for release signing."
            exit 1
          }

          $bytes = [Convert]::FromBase64String("${{ secrets.ANDROID_KEYSTORE_BASE64 }}")
          $keystoreDir = if ($env:RUNNER_TEMP) {
            $env:RUNNER_TEMP
          } elseif ($env:TEMP) {
            $env:TEMP
          } elseif ($env:USERPROFILE) {
            $env:USERPROFILE
          } else {
            (Get-Location).Path
          }
          $keystorePath = Join-Path $keystoreDir "stock-pulse-release-signing.jks"
          $keystorePathForGradle = $keystorePath -replace '\\', '/'
          New-Item -ItemType Directory -Path $keystoreDir -Force | Out-Null
          [IO.File]::WriteAllBytes($keystorePath, $bytes)

          $keyPropsPath = "android/key.properties"
          @(
            "storeFile=$keystorePathForGradle"
            "storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}"
            "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}"
            "keyPassword=${{ secrets.ANDROID_KEY_ALIAS_PASSWORD }}"
          ) | Set-Content -Path $keyPropsPath -Encoding UTF8

          Write-Host "Wrote keystore to $keystorePath"
          Write-Host "Wrote key.properties to $keyPropsPath"

      - name: Build split APKs
        run: flutter build apk --release --split-per-abi

      - name: Upload workflow artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apks
          path: |
            build/app/outputs/flutter-apk/*.apk
            build/app/outputs/flutter-apk/output-metadata.json
          if-no-files-found: error

      - name: Read app version
        id: app_version
        shell: pwsh
        run: |
          $pubspec = Get-Content pubspec.yaml
          $versionLine = $pubspec | Where-Object { $_ -match '^version:' } | Select-Object -First 1
          if (-not $versionLine) {
            Write-Error "Failed to read version from pubspec.yaml"
            exit 1
          }
          $fullVersion = ($versionLine -replace '^version:\s*', '').Trim()
          $releaseVersion = ($fullVersion -split '\+', 2)[0]
          "app_version=$fullVersion" >> $env:GITHUB_OUTPUT
          "release_version=$releaseVersion" >> $env:GITHUB_OUTPUT

      - name: Generate release notes
        id: release_notes
        shell: pwsh
        run: |
          $version = '${{ steps.app_version.outputs.app_version }}'
          $releaseVersion = '${{ steps.app_version.outputs.release_version }}'
          $tag = "v$releaseVersion"
          $previousTag = git tag --sort=-creatordate | Where-Object { $_ -ne $tag } | Select-Object -First 1
          if ($previousTag) {
            $changes = git log "$previousTag..HEAD" --pretty=format:"- %s (%h)"
          } else {
            $changes = git log -n 10 --pretty=format:"- %s (%h)"
          }
          if (-not $changes) {
            $changes = '- No commits found since the previous tag.'
          } elseif ($changes -is [array]) {
            # External command output can be a string array in pwsh; join with newlines for markdown lists.
            $changes = $changes -join "`n"
          }

          $notes = @"
          Android release build
          Version: $version
          Release tag: v$releaseVersion
          Commit: ${{ github.sha }}

          Changes:
          $changes

          Artifacts:
          - app-armeabi-v7a-release.apk
          - app-arm64-v8a-release.apk
          - app-x86_64-release.apk
          "@
          $notes | Out-File -FilePath release-notes.txt -Encoding utf8

      - name: Publish rolling release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.app_version.outputs.release_version }}
          name: v${{ steps.app_version.outputs.release_version }}
          prerelease: false
          make_latest: true
          fail_on_unmatched_files: true
          files: |
            build/app/outputs/flutter-apk/*.apk
          body_path: release-notes.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
